services:
  app:
    build:
        context: .
        dockerfile: docker/php/Dockerfile
    container_name: IRLS
    ports:
        - "80:80"
    volumes:
        - ./src:/var/www/html
        - ./storage:/var/www/html/storage
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=80
